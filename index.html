<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>表白</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}
body{
background:#ffeff5;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:"微软雅黑";
overflow:hidden;
}
h1{
font-size:40px;
color:#ff5e97;
margin-bottom:25px;
}
.btn{
padding:6px 16px;
font-size:15px;
border:none;
border-radius:18px;
background:#ff5e97;
color:#fff;
cursor:pointer;
margin:6px;
transition:0.2s;
}
#yes{
background:linear-gradient(90deg,#ff66a1,#ff3377);
box-shadow:0 0 10px rgba(255,90,150,0.5);
}
.btn:hover{
transform:scale(1.1);
}

/* 初始飘落动画 */
.flower{
position:absolute;
top:-50px;
z-index:-1;
animation:fall linear forwards;
}
.heart{
position:absolute;
top:-50px;
z-index:-1;
animation:fall linear forwards;
}
@keyframes fall{
to{transform:translateY(105vh);opacity:0;}
}

/* 成功页样式 */
.success-page body{
background: linear-gradient(to top, #ff9bbb, #ffc3d9);
}
.box{
background:white;
padding:40px 30px;
border-radius:30px;
text-align:center;
box-shadow:0 15px 30px rgba(0,0,0,0.15);
max-width:90vw;
max-height:90vh;
overflow-y:auto;
}
.title{
font-size:42px;
color:#ff3366;
font-weight:bold;
margin-bottom:20px;
}
.btn-real{
margin-top:20px;
padding:10px 25px;
background:#ff6699;
color:white;
border:none;
border-radius:20px;
font-size:18px;
cursor:pointer;
}
.love-text{
margin-top:25px;
font-size:20px;
color:#ff5e97;
display:none;
line-height:1.6;
text-align:left;
white-space: pre-line;
}
.fall{
position:absolute;
top:-60px;
z-index:1;
animation: fallSlow linear forwards;
}
@keyframes fallSlow{
0%{transform:translateY(0) rotate(0deg);opacity:1;}
100%{transform:translateY(105vh) rotate(360deg);opacity:0;}
}
</style>
</head>
<body class="main-page">
<div id="main-content">
  <h1>我喜欢你，做我对象好不好？</h1>
  <div>
    <button class="btn" id="yes">好呀</button>
    <button class="btn" id="no">不要</button>
  </div>
</div>

<div id="success-content" style="display:none;">
  <div class="box">
    <div class="title">我也超级喜欢你</div>
    <button class="btn-real" id="realBtn">真的吗？</button>
    <div class="love-text" id="loveText">
遇见你之前，我从没想过会有人让我如此心动，遇见你之后，我只想牵着你的手走完余生。
你是我清晨的第一缕阳光，也是我夜晚最温柔的梦。
我想申请做你生命里的常驻居民，房租就用我的笑容和关心来付。
因为听说喜欢一个人会让智商下降，可我愿意为你降到负数。
而且这份喜欢不是一时冲动，是每天见到你都会更确定一次。
所以我不想只做朋友，我想参与你未来的每一个故事。

爱你
    </div>
  </div>
</div>

<script>
let flowerTimer, heartTimer;

// 初始飘落动画
function createFlower(){
  let flower = document.createElement('div');
  flower.innerHTML = '🌸';
  flower.className = 'flower';
  flower.style.left = Math.random()*100+'vw';
  flower.style.fontSize=Math.random()*15+10+'px';
  flower.style.animationDuration=Math.random()*3+4+'s';
  document.body.appendChild(flower);
  setTimeout(()=>flower.remove(),7000);
}
flowerTimer = setInterval(createFlower,300);

function createHeart(){
  let heart = document.createElement('div');
  heart.innerHTML = '❤️';
  heart.className = 'heart';
  heart.style.left = Math.random()*100+'vw';
  heart.style.fontSize=Math.random()*18+12+'px';
  heart.style.animationDuration=Math.random()*3+4+'s';
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),6000);
}
heartTimer = setInterval(createHeart,200);

// 点「好呀」切换到成功页
document.getElementById('yes').onclick = function(){
  clearInterval(flowerTimer);
  clearInterval(heartTimer);
  document.querySelectorAll('.flower,.heart').forEach(item => item.remove());
  
  document.getElementById('main-content').style.display = 'none';
  document.getElementById('success-content').style.display = 'flex';
  document.body.style.justifyContent = 'center';
  document.body.style.background = 'linear-gradient(to top, #ff9bbb, #ffc3d9)';

  // 成功页飘落动画
  setInterval(()=>{
    let h = document.createElement('div');
    h.className='fall';
    h.innerHTML='❤️';
    h.style.position='absolute';
    h.style.top='-60px';
    h.style.left=Math.random()*100+'vw';
    h.style.fontSize='20px';
    h.style.zIndex='1';
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),8000);
  },220);

  setInterval(()=>{
    let f = document.createElement('div');
    f.className='fall';
    f.innerHTML='🌸';
    f.style.position='absolute';
    f.style.top='-60px';
    f.style.left=Math.random()*100+'vw';
    f.style.fontSize='18px';
    f.style.zIndex='1';
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),9000);
  },320);

  // 点「真的吗」按钮消失 + 显示文字
  setTimeout(()=>{
    document.getElementById('realBtn').onclick=function(){
      this.style.display = 'none';
      document.getElementById('loveText').style.display='block';
    }
  },100);
}

// 点「不要」乱跑
document.getElementById('no').onclick = function(){
  this.style.position='absolute';
  this.style.left=Math.random()*(window.innerWidth-100)+'px';
  this.style.top=Math.random()*(window.innerHeight-50)+'px';
};
</script>
</body>
</html>
